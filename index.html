<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>The Journey: Captain Cook’s Journal - Real-Time Historical Voyage App</title>
    <meta name="description" content="Experience Captain Cook's 1768 voyage in real-time. A historical simulator featuring verbatim journal entries and interpolated GPS tracking.">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #c5a059; 
            --dark-bg: #0f141a; 
            --glass: rgba(255, 255, 255, 0.03);
            --text-light: #e0e0e0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6; 
            margin: 0; 
            color: var(--text-light); 
            background-color: var(--dark-bg);
            overflow-x: hidden;
        }
        
        /* Cinematic Hero Section */
        header { 
            background: linear-gradient(to bottom, rgba(15,20,26,0.2), rgba(15,20,26,1)), url('OnTheSevenSeas.png') no-repeat center/cover; 
            height: 85vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            text-align: center;
        }

        .hero-content {
            padding: 20px;
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { 
            font-family: 'Cinzel', serif; 
            font-size: clamp(2.5rem, 8vw, 5rem); 
            margin: 0; 
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .hero-sub { 
            font-family: 'EB Garamond', serif;
            font-size: 1.6rem; 
            font-style: italic;
            color: var(--gold);
            margin-bottom: 30px;
        }

        .container { max-width: 1100px; margin: auto; padding: 40px 20px; }
        
        section { padding: 80px 0; }
        
        /* Modern UI Cards */
        .feature-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 40px; 
            margin-top: 30px; 
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }
        .card:hover { border-color: var(--gold); background: rgba(255,255,255,0.05); }
